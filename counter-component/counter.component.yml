spec_version: 1.0.0
component: CounterComponent
version: 1.0.0
kind: stateful

description: >
  A bounded integer counter.
  Supports increment, decrement, get, and reset operations.
  Value is bounded between min and max.

instructions: >
  Use counter_get to check the current value before deciding to increment or decrement.
  The counter has upper and lower bounds — operations outside those bounds return a declared error.

input:
  increment:
    type: object
    additionalProperties: false
    properties:
      amount:
        type: integer
        minimum: 1
        default: 1
        description: Amount to increment by
    required: []

  decrement:
    type: object
    additionalProperties: false
    properties:
      amount:
        type: integer
        minimum: 1
        default: 1
        description: Amount to decrement by
    required: []

  get:
    type: object
    additionalProperties: false
    properties: {}
    required: []

  reset:
    type: object
    additionalProperties: false
    properties: {}
    required: []

output:
  type: object
  additionalProperties: false
  required:
    - value
  properties:
    value:
      type: integer
      description: Current counter value after operation

state:
  type: object
  properties:
    value:
      type: integer
      default: 0
    min:
      type: integer
      default: -2147483648
    max:
      type: integer
      default: 2147483647

errors:
  COUNTER_OVERFLOW:
    retryable: false
    description: Increment would exceed maximum value
  COUNTER_UNDERFLOW:
    retryable: false
    description: Decrement would go below minimum value

policies:
  idempotency: not-required
  timeoutMs: 100

sideEffects:
  allowed: []
  forbidden:
    - network
    - filesystem
    - database

guarantees:
  verifiable:
    - operation: get
      assertion: state_unchanged_after_call
      test: counter.test.ts#get_does_not_change_observable_value
    - operation: reset
      assertion: value_is_zero_after_call
      test: counter.test.ts#reset_sets_value_to_0
    - operation: increment
      assertion: value_increases_by_exact_amount
      test: counter.test.ts#increments_by_specified_amount
    - operation: decrement
      assertion: value_decreases_by_exact_amount
      test: counter.test.ts#decrements_by_specified_amount
    - operation: increment
      assertion: state_unchanged_on_overflow
      test: counter.test.ts#does_not_change_observable_value_on_failure
    - operation: decrement
      assertion: state_unchanged_on_underflow
      test: counter.test.ts#does_not_change_observable_value_on_failure
  aspirational:
    - statement: "only declared error codes cross the boundary"
      enforcement: catch-all error wrapper in boundary layer + error taxonomy conformance test
    - statement: "no network, filesystem, or database calls are made"
      enforcement: side-effect declaration + code review

annotations:
  increment:
    readOnly: false
    destructive: false
    idempotent: false
    openWorld: false
  decrement:
    readOnly: false
    destructive: false
    idempotent: false
    openWorld: false
  get:
    readOnly: true
    destructive: false
    idempotent: true
    openWorld: false
  reset:
    readOnly: false
    destructive: true
    idempotent: true
    openWorld: false
